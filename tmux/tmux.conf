# ─── General ──────────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g mouse on

set -g status-interval 5
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

set -g set-titles on
set -g set-titles-string "#S · #W"

# ─── Key Bindings ─────────────────────────────────────────────────────────────

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window at current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Move windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Kill without confirmation
bind x kill-pane
bind X kill-window

# ─── Copy Mode ────────────────────────────────────────────────────────────────

set -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel

# ─── Catppuccin Mocha (native) ────────────────────────────────────────────────

# Palette
mocha_base="#1e1e2e"
mocha_surface0="#313244"
mocha_surface1="#45475a"
mocha_overlay1="#7f849c"
mocha_subtext1="#bac2de"
mocha_text="#cdd6f4"
mocha_lavender="#b4befe"
mocha_blue="#89b4fa"
mocha_mauve="#cba6f7"
mocha_green="#a6e3a1"
mocha_yellow="#f9e2af"
mocha_peach="#fab387"
mocha_red="#f38ba8"

# Pane borders
set -g pane-border-style "fg=#{mocha_surface0}"
set -g pane-active-border-style "fg=#{mocha_lavender}"

# Message bar
set -g message-style "fg=#{mocha_text},bg=#{mocha_surface0}"
set -g message-command-style "fg=#{mocha_text},bg=#{mocha_surface0}"

# Copy mode highlight
set -g mode-style "fg=#{mocha_base},bg=#{mocha_lavender}"

# ─── Status Bar ───────────────────────────────────────────────────────────────

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#{mocha_text},bg=#{mocha_base}"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#{mocha_base},bg=#{mocha_mauve},bold] #S #[fg=#{mocha_mauve},bg=#{mocha_base}]"

# Right: date + time
set -g status-right-length 60
set -g status-right "#[fg=#{mocha_surface1}]#[fg=#{mocha_subtext1},bg=#{mocha_surface1}] %a %d %b #[fg=#{mocha_blue},bg=#{mocha_surface1}]#[fg=#{mocha_base},bg=#{mocha_blue}] %H:%M #[default]"

# Window tabs
set -g window-status-separator ""
set -g window-status-format "#[fg=#{mocha_surface1}]#[fg=#{mocha_subtext1},bg=#{mocha_surface1}] #I  #W #[fg=#{mocha_surface1},bg=#{mocha_base}]"
set -g window-status-current-format "#[fg=#{mocha_lavender}]#[fg=#{mocha_base},bg=#{mocha_lavender},bold] #I  #W #[fg=#{mocha_lavender},bg=#{mocha_base}]"
