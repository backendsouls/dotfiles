# ─── General ──────────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g mouse on

set -g status-interval 5
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"


set -g set-titles on
set -g set-titles-string "#S · #W"

# ─── Key Bindings ─────────────────────────────────────────────────────────────

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window at current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim + arrows)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Move windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Kill without confirmation
bind x kill-pane
bind X kill-window

# Session save/restore
bind C-s run-shell "tmux-save"
bind C-r run-shell "tmux-restore"

# New session
bind C-c command-prompt -p "session name:" "new-session -s '%%'"

# Auto-save on window/session changes
set-hook -g after-new-window   'run-shell "tmux-save"'
set-hook -g after-kill-pane    'run-shell "tmux-save"'
set-hook -g after-new-session  'run-shell "tmux-save"'

# ─── Copy Mode ────────────────────────────────────────────────────────────────

set -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel

# ─── Catppuccin Mocha (native) ────────────────────────────────────────────────
# Palette (inlined — tmux doesn't expand #{...} inside style options reliably):
#   base     #11111b   surface0 #313244   surface1 #1e1e2e
#   text     #cdd6f4   subtext1 #bac2de   overlay1 #7f849c
#   mauve    #cba6f7   lavender #b4befe   blue     #89b4fa
#   green    #a6e3a1   yellow   #f9e2af   peach    #fab387   red #f38ba8

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#b4befe"

# Message bar
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

# Copy mode highlight
set -g mode-style "fg=#11111b,bg=#b4befe"

# ─── Status Bar ───────────────────────────────────────────────────────────────

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#cdd6f4,bg=#313244"

# Left: session name
set -g status-left-length 30
set -g status-left " #[fg=#11111b,bg=#9d7cd8,bold] #S #[fg=#313244,bg=#313244] "

# Right: date + time
set -g status-right-length 60
set -g status-right "#[fg=#bac2de,bg=#313244] %a %d %b  #[fg=#89b4fa,bg=#313244]#[fg=#11111b,bg=#89b4fa,bold] %H:%M #[fg=#89b4fa,bg=#313244]"

# Window tabs
set -g window-status-separator ""
set -g window-status-format "#[fg=#1e1e2e,bg=#313244]#[fg=#bac2de,bg=#1e1e2e] #I  #W #[fg=#1e1e2e,bg=#313244]"
set -g window-status-current-format "#[fg=#b4befe,bg=#313244]#[fg=#11111b,bg=#b4befe,bold] #I  #W #[fg=#b4befe,bg=#313244]"
